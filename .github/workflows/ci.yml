name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.7.4 mypy==1.13.0 types-requests==2.32.0.20241016

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m compileall -q tracker

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: "999999:TEST"
          TELEGRAM_CHAT_ID: "0"
        run: pytest tests/ -v
