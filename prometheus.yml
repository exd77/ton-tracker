# Prometheus scrape config for the tracker bot when run via docker compose.
# The bot exposes Counter/Gauge/Histogram metrics on /metrics and a JSON
# /healthz endpoint on the same port.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: ton-launch-tracker
    metrics_path: /metrics
    static_configs:
      - targets:
          - tracker:9100
